version: '0.1'
updated_at: '2026-04-07T19:32:31+08:00'
authority_source: docs/governance/MODULAR_ROADMAP_SCHEDULER_DESIGN.md
schema_source: docs/governance/ROADMAP_BACKLOG_SCHEMA.yaml
status: draft

defaults:
  legacy_reserved_paths_map_to: &legacy_reserved_paths_forbidden forbidden_write_paths
  claim_policy: &default_claim_policy
    one_window_one_candidate: true
    conflict_policy: choose_next_safe_candidate
    scheduler_lock_required: true
  parallel_claim_policy: &parallel_claim_policy
    one_window_one_candidate: true
    conflict_policy: require_disjoint_child_slice
    scheduler_lock_required: true
  single_writer_claim_policy: &single_writer_claim_policy
    one_window_one_candidate: true
    conflict_policy: strict_single_writer
    scheduler_lock_required: true
  takeover_policy: &default_takeover_policy
    stale_after_minutes_source: docs/governance/HANDOFF_POLICY.yaml
    clean_worktree_takeover: allow
    scoped_dirty_checkpoint: allow_before_takeover
    out_of_scope_dirty_policy: block_for_human_decision
    remote_divergence_policy: block

scheduler_policy:
  entrypoint: claim-next
  natural_language_intent: [持续按路线图开发]
  candidate_refresh_mode: locked_refresh_before_claim
  claim_capacity_source: docs/governance/TASK_POLICY.yaml#roadmap_scheduler.max_active_claims_v1
  dispatch_authority: compiled_candidate_graph
  single_writer_roots:
  - db/migrations/
  - src/stage6_facts/
  - src/stage7_sales/
  - src/stage8_contact/
  - src/stage9_delivery/

compiler_policy:
  mode: module_graph_compiler
  compiled_graph_file: .codex/local/roadmap_candidates/compiled.yaml
  graph_version: roadmap_compiled_graph_v1
  fallback_mode: blocked_when_stale

stages:
- stage: stage1
  module_id: stage1_orchestration
  depends_on: []
  unlocks: [stage2]
  contract_gate: stage1-core-contract
  integration_gate: stage1-source-family-integration-gate
- stage: stage2
  module_id: stage2_ingestion
  depends_on: [stage1]
  unlocks: [stage3]
  contract_gate: stage2-core-contract
  integration_gate: stage2-integration-gate
- stage: stage3
  module_id: stage3_parsing
  depends_on: [stage2]
  unlocks: [stage4]
  contract_gate: stage3-core-contract
  integration_gate: stage3-integration-gate
- stage: stage4
  module_id: stage4_validation
  depends_on: [stage3]
  unlocks: [stage5, stage6]
  contract_gate: stage4-core-contract
  integration_gate: stage4-integration-gate
- stage: stage5
  module_id: stage5_reporting
  depends_on: [stage4]
  unlocks: [stage6]
  contract_gate: stage5-core-contract
  integration_gate: stage5-integration-gate
- stage: stage6
  module_id: stage6_facts
  depends_on: [stage4, stage5]
  unlocks: [stage7, stage8, domain_consumers]
  contract_gate: stage6-fact-surface-gate
  integration_gate: stage6-fact-surface-gate
- stage: stage7
  module_id: stage7_sales
  depends_on: [stage6]
  unlocks: [stage9]
  contract_gate: stage7-core-contract
  integration_gate: stage7-integration-gate
- stage: stage8
  module_id: stage8_contact
  depends_on: [stage6]
  unlocks: [stage9]
  contract_gate: stage8-core-contract
  integration_gate: stage8-integration-gate
- stage: stage9
  module_id: stage9_delivery
  depends_on: [stage6, stage7, stage8]
  unlocks: []
  contract_gate: stage9-final-delivery-gate
  integration_gate: stage9-final-delivery-gate

lane_blueprints:
- blueprint_id: stage_core_contract
  lane_type: core_contract
  parallel_policy: single_writer
  purpose: Freeze stage input, output, fixture, branch, and path boundary before child lanes.
- blueprint_id: stage_internal_parallel
  lane_type: stage_internal_parallel
  parallel_policy: disjoint_paths_required
  purpose: Split same-stage work by source family, parser family, rule topic, formatter, fixture, or guard.
- blueprint_id: downstream_fixture_preview
  lane_type: downstream_fixture_preview
  parallel_policy: disjoint_paths_required
  purpose: Allow downstream skeleton or test work only against frozen upstream fixtures.
- blueprint_id: integration_gate
  lane_type: integration_gate
  parallel_policy: single_writer
  purpose: Merge child outputs and unlock downstream contract work.
- blueprint_id: fact_surface_gate
  lane_type: fact_surface_gate
  parallel_policy: strict_single_writer
  purpose: Protect the stage6 project_fact surface.

candidates: []
