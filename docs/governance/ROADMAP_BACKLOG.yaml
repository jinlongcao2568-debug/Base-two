schema_source: docs/governance/ROADMAP_BACKLOG_SCHEMA.yaml
status: draft

defaults:
  claim_policy: &default_claim_policy
    one_window_one_candidate: true
    conflict_policy: choose_next_safe_candidate
    scheduler_lock_required: true
  parallel_claim_policy: &parallel_claim_policy
    one_window_one_candidate: true
    conflict_policy: require_disjoint_child_slice
    scheduler_lock_required: true
  single_writer_claim_policy: &single_writer_claim_policy
    one_window_one_candidate: true
    conflict_policy: strict_single_writer
    scheduler_lock_required: true
  takeover_policy: &default_takeover_policy
    stale_after_minutes_source: docs/governance/HANDOFF_POLICY.yaml
    clean_worktree_takeover: allow
    scoped_dirty_checkpoint: allow_before_takeover
    out_of_scope_dirty_policy: block_for_human_decision
    remote_divergence_policy: block

scheduler_policy:
  entrypoint: claim-next
  natural_language_intent: [持续按路线图开发]
  candidate_refresh_mode: locked_refresh_before_claim
  max_initial_parallel_windows: 4
  single_writer_roots:
  - db/migrations/
  - src/stage6_facts/
  - src/stage7_sales/
  - src/stage8_contact/
  - src/stage9_delivery/

stages:
- stage: stage1
  module_id: stage1_orchestration
  depends_on: []
  unlocks: [stage2]
  contract_gate: stage1-core-contract
  integration_gate: stage1-integration-gate
- stage: stage2
  module_id: stage2_ingestion
  depends_on: [stage1]
  unlocks: [stage3]
  contract_gate: stage2-core-contract
