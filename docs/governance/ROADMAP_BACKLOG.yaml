  unlocks: []
  contract_gate: stage9-final-delivery-gate
  integration_gate: stage9-final-delivery-gate

lane_blueprints:
- blueprint_id: stage_core_contract
  lane_type: core_contract
  parallel_policy: single_writer
  purpose: Freeze stage input, output, fixture, branch, and path boundary before child lanes.
- blueprint_id: stage_internal_parallel
  lane_type: stage_internal_parallel
  parallel_policy: disjoint_paths_required
  purpose: Split same-stage work by source family, parser family, rule topic, formatter, fixture, or guard.
- blueprint_id: downstream_fixture_preview
  lane_type: downstream_fixture_preview
  parallel_policy: disjoint_paths_required
  purpose: Allow downstream skeleton or test work only against frozen upstream fixtures.
- blueprint_id: integration_gate
  lane_type: integration_gate
  parallel_policy: single_writer
  purpose: Merge child outputs and unlock downstream contract work.
- blueprint_id: fact_surface_gate
  lane_type: fact_surface_gate
  parallel_policy: strict_single_writer
  purpose: Protect the stage6 project_fact surface.

