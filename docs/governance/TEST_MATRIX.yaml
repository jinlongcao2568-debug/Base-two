version: '1.1'
updated_at: '2026-04-04T23:20:00+08:00'
size_class_gates:
  micro:
    preflight:
      - python scripts/check_repo.py
      - python scripts/check_hygiene.py
    worker:
      - module unit tests
    closeout:
      - module-aligned closeout tests only
  standard:
    preflight:
      - python scripts/check_repo.py
      - python scripts/check_hygiene.py
      - python scripts/validate_contracts.py
    worker:
      - module unit tests
      - targeted integration smoke tests
    closeout:
      - module-aligned closeout tests only
      - targeted integration smoke tests when required
  heavy:
    preflight:
      - python scripts/check_authority_alignment.py
      - python scripts/check_repo.py
      - python scripts/check_hygiene.py
      - python scripts/validate_contracts.py
      - python scripts/task_ops.py decide-topology TASK-ID
    worker:
      - child module unit tests
      - authority-critical integration tests
    closeout:
      - authority-critical chains
      - governance release suites when path-triggered
test_bundles:
  repo_hygiene:
    description: Repo and hygiene validation for governed control-plane changes.
    commands:
      - python scripts/check_repo.py
      - python scripts/check_hygiene.py src docs tests
  authority_alignment:
    description: Authority alignment validation for governance-core policy changes.
    commands:
      - python scripts/check_authority_alignment.py
  governance_fast_regression:
    description: Fast governance regression for low-risk docs, ledger, and metadata changes.
    commands:
      - pytest tests/governance/test_check_repo.py -q
      - pytest tests/governance/test_check_hygiene.py -q
      - pytest tests/governance/test_governance_state_machine.py -q
  governance_workflow_regression:
    description: Workflow regression for continuation, lease, handoff, closeout, and orchestration state-machine logic.
    commands:
      - pytest tests/governance/test_check_repo.py -q
      - pytest tests/governance/test_task_continuation.py -q
      - pytest tests/governance/test_parallel_closeout_pipeline.py -q
      - pytest tests/governance/test_coordination_lease.py -q
      - pytest tests/governance/test_handoff_recovery.py -q
      - pytest tests/governance/test_orchestration_runtime.py -q
      - pytest tests/governance/test_task_ops.py -q
  governance_publish_regression:
    description: Publish, preflight, and automation-intent regression for governance-side release flows.
    commands:
      - pytest tests/governance/test_task_publish_ops.py -q
      - pytest tests/governance/test_automation_intent.py -q
  automation_runner_regression:
    description: Runner, lane budget, cleanup pressure, and orchestration runtime regression.
    commands:
      - pytest tests/automation/test_automation_runner.py -q
      - pytest tests/automation/test_high_throughput_runner.py -q
      - pytest tests/automation/test_orchestration_runtime_runner.py -q
      - pytest tests/automation/test_task_gov_017_runtime.py -q
      - pytest tests/automation/test_task_gov_018_runtime.py -q
  governance_full_suite:
    description: Full governance release regression suite.
    commands:
      - pytest tests/governance -q
  automation_full_suite:
    description: Full automation release regression suite.
    commands:
      - pytest tests/automation -q
governance_test_profiles:
  governance_fast:
    description: Fast governance validation for ordinary docs, ledgers, and low-risk governance metadata changes.
    default_for_unmatched_governance_paths: true
    allowed_path_prefixes:
      - docs/governance/
      - tests/governance/
      - tests/automation/
    test_bundles:
      - repo_hygiene
      - governance_fast_regression
  governance_workflow:
    description: Workflow regression for continuation, lease, handoff, closeout, and orchestration state-machine logic.
    test_bundles:
      - repo_hygiene
      - governance_workflow_regression
  governance_publish:
    description: Publish, preflight, and intent-routing regression for governance-side release flows.
    test_bundles:
      - repo_hygiene
      - governance_publish_regression
  automation_runner:
    description: Runner, dispatch, lane budget, cleanup pressure, and orchestration runtime regression.
    test_bundles:
      - repo_hygiene
      - automation_runner_regression
  full_governance_release:
    description: Full governance and automation release-grade regression for core policy and gate changes.
    test_bundles:
      - repo_hygiene
      - authority_alignment
      - governance_full_suite
      - automation_full_suite
authority_critical_chains:
  stage3_stage4_stage6_minimal:
    description: Stage 3 project_base must be consumed by stage 4 rule_hit and then by the stage 6 project_fact.
    formal_objects:
      - project_base
      - rule_hit
      - project_fact
    fixture_paths:
      - tests/fixtures/raw/project_notice.raw.json
      - tests/fixtures/normalized/project_base.normalized.json
      - tests/fixtures/rules/rule_hit.normalized.json
      - tests/fixtures/facts/project_fact.normalized.json
      - tests/fixtures/golden/stage3_stage4_stage6_minimal_flow.golden.json
    required_tests:
      - pytest tests/stage3 -q
      - pytest tests/stage4 -q
      - pytest tests/stage6 -q
      - pytest tests/integration -q
  stage4_stage5_stage6_case_matrix:
    description: Stage 4 formal objects, stage 5 report_record, and stage 6 project_fact must remain aligned across the live multi-sample regression matrix.
    formal_objects:
      - project_base
      - rule_hit
      - evidence
      - review_request
      - report_record
      - project_fact
    fixture_paths:
      - tests/fixtures/raw/case_*.raw.json
      - tests/fixtures/normalized/case_*.project_base.json
      - tests/fixtures/rules/case_*.rule_hit.json
      - tests/fixtures/rules/case_*.evidence.json
      - tests/fixtures/rules/case_*.review_request.json
      - tests/fixtures/reports/case_*.report_record.json
      - tests/fixtures/facts/case_*.project_fact.json
      - tests/fixtures/golden/case_*.stage_chain.json
    required_tests:
      - pytest tests/contracts -q
      - pytest tests/stage4 -q
      - pytest tests/stage6 -q
      - pytest tests/integration -q
single_machine_practical_matrix:
  single_machine_lifecycle:
    description: Single-machine lifecycle from active coordination through review-ready closeout or idle reset.
    trigger_conditions:
      - continue-current
      - continue-roadmap
      - promote-candidate --activate
      - worker-report
      - worker-finish
      - close
    test_bundles:
      - governance_full_suite
      - automation_full_suite
    failure_signals:
      - CURRENT_TASK lifecycle drift
      - review-ready task cannot close cleanly
      - active task resumes on the wrong branch or writer state
  single_machine_recovery:
    description: Formal handoff, fallback recovery, release, takeover, and stale lease reclaim on one machine.
    trigger_conditions:
      - handoff
      - release
      - takeover
      - continue-current recovery
    test_bundles:
      - governance_full_suite
    failure_signals:
      - recovery pack missing required fields
      - stale lease cannot be reclaimed safely
      - new session gains write access without release or takeover
  single_machine_write_safety:
    description: Single-writer protection for live coordination tasks and continuation guardrails.
    trigger_conditions:
      - active other session
      - dirty worktree
      - branch mismatch
      - ledger drift
      - incomplete boundary candidate
    test_bundles:
      - governance_full_suite
    failure_signals:
      - continue-current writes while another session owns the lease
      - continue-roadmap activates through dirty or drifting control-plane state
      - planner candidate promotion mutates CURRENT_TASK without explicit activation
  single_machine_runner_fallback:
    description: Runner fallback behavior under cleanup pressure, lane conflicts, review-bundle failure, and budget saturation.
    trigger_conditions:
      - automation_runner once --continue-roadmap --prepare-worktrees
      - cleanup pressure
      - review bundle failure
      - lane conflict
    test_bundles:
      - automation_full_suite
    failure_signals:
      - runner prepares worktrees beyond effective budget
      - lane conflict does not hard-stop the cycle
      - child review bundle failure is invisible to metrics or parent state
  single_machine_orchestrator_runtime:
    description: Runtime tick, reconcile, session telemetry, and registry-backed runtime state must stay aligned.
    trigger_conditions:
      - continue-current
      - continue-roadmap
      - handoff
      - release
      - takeover
      - plan-coordination
      - promote-candidate
      - automation_runner
    test_bundles:
      - governance_full_suite
      - automation_full_suite
    failure_signals:
      - runtime file lacks stable blocks
      - session telemetry misses current command or writer state
      - runtime status does not reflect blocked or review-ready control-plane state
  single_machine_observability:
    description: orchestration-status must provide a stable operator-facing snapshot of runtime, lease, sessions, sources, workers, publish readiness, and runner pressure.
    trigger_conditions:
      - task_ops orchestration-status --format yaml
      - task_ops orchestration-status --format json
    test_bundles:
      - governance_full_suite
    failure_signals:
      - status output omits required top-level sections
      - disabled sources or unsupported workers are not visible
      - publish readiness diverges from publish-preflight gate outcomes
      - candidate summary or runner pressure is inconsistent with current ledgers
future_scale_interface_matrix:
  task_source_adapter_contract:
    description: Task-source adapters must expose enabled, implemented, status, and unsupported_in_v1 explicitly.
    trigger_conditions:
      - task source registry load
      - orchestration-status task_sources output
    test_bundles:
      - governance_full_suite
    failure_signals:
      - external source appears active without explicit enablement
      - unsupported adapter state is hidden from operators
  worker_registry_contract:
    description: Worker registry must keep the local worker explicit and future remote workers auditable.
    trigger_conditions:
      - worker registry load
      - orchestration-status workers output
    test_bundles:
      - governance_full_suite
      - automation_full_suite
    failure_signals:
      - local worker disappears from status output
      - worker identity or kind becomes implicit
  remote_worker_guardrails:
    description: Non-local workers remain reserved interfaces only and must never receive work in v1.
    trigger_conditions:
      - runner pressure evaluation
      - orchestration-status workers output
    test_bundles:
      - governance_full_suite
      - automation_full_suite
    failure_signals:
      - remote worker is silently treated as schedulable
      - unsupported worker does not surface as unsupported_in_v1
  disabled_external_source_visibility:
    description: Disabled external issue sources must remain visible in the runtime status surface.
    trigger_conditions:
      - orchestration-status task_sources output
    test_bundles:
      - governance_full_suite
    failure_signals:
      - disabled source disappears from the registry view
      - external source appears implemented without explicit support
