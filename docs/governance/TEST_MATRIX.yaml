version: '1.0'
updated_at: '2026-04-04T17:10:00+08:00'
size_class_gates:
  micro:
    preflight:
    - python scripts/check_repo.py
    - python scripts/check_hygiene.py
    worker:
    - module unit tests
    closeout:
    - pytest tests/governance -q
  standard:
    preflight:
    - python scripts/check_repo.py
    - python scripts/check_hygiene.py
    worker:
    - module unit tests
    - targeted integration smoke tests
    closeout:
    - pytest tests/governance -q
  heavy:
    preflight:
    - python scripts/check_repo.py
    - python scripts/check_hygiene.py
    - python scripts/task_ops.py decide-topology TASK-ID
    worker:
    - child module unit tests
    - shared integration smoke tests
    closeout:
    - pytest tests/governance -q
    - pytest -q
