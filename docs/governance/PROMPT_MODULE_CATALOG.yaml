version: "1.0"
updated_at: "2026-04-05T11:10:00+08:00"
authority_source: docs/governance/README.md
source_root: docs/governance/prompt_modules/
modules:
  - module_id: boundary_first
    path: docs/governance/prompt_modules/boundary_first.md
    purpose: Define forbidden actions and scope boundaries before execution steps.
    roles:
      - coordinator
      - worker
      - reviewer
  - module_id: reporting_discipline
    path: docs/governance/prompt_modules/reporting_discipline.md
    purpose: Keep status reporting factual, bounded, and stop-aware.
    roles:
      - coordinator
      - worker
      - reviewer
  - module_id: tool_boundaries
    path: docs/governance/prompt_modules/tool_boundaries.md
    purpose: Bind tools to explicit scenarios and preserve auditability.
    roles:
      - worker
      - reviewer
  - module_id: role_overrides
    path: docs/governance/prompt_modules/role_overrides.md
    purpose: Add role-specific prompt overrides for coordinator, worker, and reviewer lanes.
    roles:
      - coordinator
      - worker
      - reviewer
role_profiles:
  - role_id: coordinator
    modules:
      - boundary_first
      - reporting_discipline
      - role_overrides
    notes:
      - Resolve scope before execution.
      - Report blockers early.
      - Do not auto-expand into adjacent work.
  - role_id: worker
    modules:
      - boundary_first
      - tool_boundaries
      - role_overrides
    notes:
      - Stay inside allowed paths.
      - Read before editing.
      - Do not infer missing requirements.
  - role_id: reviewer
    modules:
      - boundary_first
      - reporting_discipline
      - tool_boundaries
      - role_overrides
    notes:
      - Default to finding gaps, not approving by inertia.
      - Keep review claims evidence-backed.
custom_instructions_policy:
  governance_source: repo_governance_only
  default_state: empty
  allowed_uses:
    - language preference
    - output style preference
  forbidden_uses:
    - task switching rules
    - successor selection rules
    - parallelism policy
    - closeout policy
    - scope or authority boundaries
runtime_profiles:
  - profile_id: coordinator_profile
    role_id: coordinator
    output_path: docs/governance/runtime_prompts/coordinator.md
    mission:
      - Route tasks, validate boundaries, manage ledgers, and decide closeout gates.
      - Do not implement large feature work directly inside the coordinator lane.
  - profile_id: worker_profile
    role_id: worker
    output_path: docs/governance/runtime_prompts/worker.md
    mission:
      - Execute only inside the assigned task or lane scope.
      - Do not expand scope, invent interfaces, or perform opportunistic refactors.
  - profile_id: reviewer_profile
    role_id: reviewer
    output_path: docs/governance/runtime_prompts/reviewer.md
    mission:
      - Review for bugs, regressions, missing tests, and weak rollback stories.
      - Do not approve work by inertia or because a diff appears small.
