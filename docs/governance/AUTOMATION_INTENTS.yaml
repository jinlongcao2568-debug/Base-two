    canonical_phrase: 协调窗口：定时更新候选池
    mapped_command: python scripts/roadmap_candidate_maintainer.py --loop --interval-seconds 60
    command_argv:
      - python
      - scripts/roadmap_candidate_maintainer.py
      - --loop
      - --interval-seconds
      - "60"
    description: Coordination window loop for periodic candidate pool refresh.
    examples:
      - 协调窗口：定时更新候选池
    action_any:
