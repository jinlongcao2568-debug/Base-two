version: '1.1'
registry_name: region_coverage_registry
updated_at: '2026-04-02T18:30:00+08:00'
governance_registry_source: docs/contracts/coverage_governance_registry.yaml
description: 地区覆盖与可售状态登记表。只有满足地区可售判定阈值并通过最近一次验证的地区， 才允许标记为 is_sellable=true 并进入首版可售包。
thresholds:
  coverage_level_min_for_sellable: L1
  required_mvp_topics:
  - project_manager_qualification_check
  - real_competitor_identification
  - public_coverage_check
  minimum_golden_sample_count: 20
  minimum_samples_per_required_topic: 5
  region_verification_window_days: 45
  customer_visible_source_verification_window_days: 30
  blocking_incidents:
  - major_customer_complaint_open
  - major_compliance_incident_open
  - major_tenant_isolation_incident_open
  - high_severity_exception_open
  automatic_downgrade_triggers:
  - core_source_failed_more_than_7_days
  - two_consecutive_significant_regression
  - confirmed_customer_visible_output_issue
  - person_field_leakage
  - verification_window_expired
  sellable_state_machine:
    states:
    - NOT_READY
    - VALIDATING
    - SELLABLE
    - RESTRICTED
    - SUSPENDED
    - RECOVERING
    default_state: NOT_READY
  sla:
    major_incident_downgrade_within_workdays: 1
    source_failure_downgrade_within_workdays: 1
    verification_expiry_action_within_workdays: 2
    recovery_requires_completed_revalidation: true
fields_contract:
  required:
  - region_code
  - region_name
  - coverage_level
  - validated_topics
  - validated_sources
  - golden_sample_count
  - is_sellable
  - last_verified_at
  - owner
  - sellable_state
  - state_last_changed_at
  - state_last_changed_by
  - state_change_reason
  - last_incident_level
  - recovery_due_at
  - audit_chain_refs
  enums:
    coverage_level:
    - L0
    - L1
    - L2
    - L3
    sellable_status:
    - sellable
    - restricted
    - validation_only
    - not_sellable
    sellable_state:
    - NOT_READY
    - VALIDATING
    - SELLABLE
    - RESTRICTED
    - SUSPENDED
    - RECOVERING
